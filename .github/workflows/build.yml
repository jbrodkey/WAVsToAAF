name: Build WAVsToAAF Windows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Extract version
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content _version.py -Raw
          if ($content -match '__version__\s*=\s*[''\"]([^''\"]+)[''\"]') {
            $version = $matches[1]
            "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          else {
            Write-Error "Unable to parse version from _version.py"
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Download and bundle FFmpeg
        shell: pwsh
        run: |
          $url = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-git-essentials.7z'
          $archivePath = 'packaging\ffmpeg.7z'
          $outDir = 'packaging\ffmpeg'

          Write-Host "Downloading FFmpeg from $url"
          if (Get-Command curl.exe -ErrorAction SilentlyContinue) {
            & curl.exe -L $url -o $archivePath --fail --silent --show-error
          } else {
            Invoke-WebRequest -Uri $url -OutFile $archivePath -UseBasicParsing
          }

          if (-not (Test-Path $archivePath)) {
            throw "FFmpeg download failed"
          }

          $size = (Get-Item $archivePath).Length
          Write-Host "Downloaded FFmpeg archive size: $size bytes"

          if (Test-Path $outDir) { Remove-Item -Recurse -Force $outDir }
          $temp = 'packaging\ffmpeg_temp'
          if (Test-Path $temp) { Remove-Item -Recurse -Force $temp }
          New-Item -ItemType Directory -Path $temp -Force | Out-Null

          # Try extracting with 7z; install via Chocolatey if missing and refresh environment
          $extracted = $false
          if (Get-Command 7z.exe -ErrorAction SilentlyContinue) {
            Write-Host "7z.exe found in PATH; extracting"
            & 7z.exe x $archivePath -o$temp -y | Out-Host
            if ($LASTEXITCODE -eq 0) {
              $extracted = $true
            } else {
              Write-Host "7z.exe extraction failed with exit code $LASTEXITCODE"
            }
          } else {
            Write-Host "7z.exe not found, attempting to install 7zip.commandline via Chocolatey"
            choco install 7zip.commandline -y || Write-Host "choco install returned non-zero"
            # Refresh environment so PATH changes are visible in this session
            if (Get-Command refreshenv -ErrorAction SilentlyContinue) {
              refreshenv | Out-Null
            } else {
              $env:PATH = $env:PATH + ';C:\ProgramData\chocolatey\bin'
            }
            if (Get-Command 7z.exe -ErrorAction SilentlyContinue) {
              Write-Host "7z.exe now available; extracting"
              & 7z.exe x $archivePath -o$temp -y | Out-Host
              if ($LASTEXITCODE -eq 0) {
                $extracted = $true
              } else {
                Write-Host "7z.exe extraction failed with exit code $LASTEXITCODE"
              }
            } else {
              Write-Host "7z.exe still not available after Chocolatey install"
            }
          }

          # Fallback to ZIP if 7z extraction failed
          $zipPath = 'packaging\ffmpeg.zip'
          if (-not $extracted) {
            Write-Host "7z extraction failed; falling back to zip release package"
            Remove-Item -Force -ErrorAction SilentlyContinue $archivePath
            $urlZip = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
            if (Get-Command curl.exe -ErrorAction SilentlyContinue) {
              & curl.exe -L $urlZip -o $zipPath --fail --silent --show-error
            } else {
              Invoke-WebRequest -Uri $urlZip -OutFile $zipPath -UseBasicParsing
            }
            if (-not (Test-Path $zipPath)) { throw "Fallback FFmpeg zip download failed" }
            Write-Host "Extracting ZIP fallback"
            Expand-Archive -Path $zipPath -DestinationPath $temp -Force
          }

          $inner = Get-ChildItem -Path $temp -Directory | Where-Object {
            (Test-Path (Join-Path $_.FullName 'bin\ffmpeg.exe')) -or (Test-Path (Join-Path $_.FullName 'ffmpeg.exe'))
          } | Select-Object -First 1

          if (-not $inner) {
            if ((Test-Path "$temp\bin\ffmpeg.exe") -or (Test-Path "$temp\ffmpeg.exe")) {
              $inner = Get-Item $temp
            } else {
              $inner = Get-ChildItem -Path $temp -Directory | Select-Object -First 1
            }
          }

          if (-not $inner) { throw "Failed to extract FFmpeg archive" }

          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Move-Item -Path (Join-Path $inner.FullName '*') -Destination $outDir -Force

          if (-not ((Test-Path "$outDir\bin\ffmpeg.exe") -or (Test-Path "$outDir\ffmpeg.exe"))) {
            throw "FFmpeg binaries not found after extraction"
          }

          Write-Host "FFmpeg successfully bundled to packaging/ffmpeg"
          Remove-Item $archivePath -Force -ErrorAction SilentlyContinue
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item $temp -Recurse -Force

      - name: Clean previous builds
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }

      - name: Syntax check
        run: |
          python -m py_compile wav_to_aaf.py

      - name: Generate Windows version info
        run: |
          python packaging/generate_version_info.py

      - name: Build exe (PyInstaller using spec file)
        run: |
          pyinstaller packaging/WAVsToAAF-Windows.spec

      - name: Validate built exe
        shell: pwsh
        run: |
          $exePath = "dist\WAVsToAAF.exe"
          if (-not (Test-Path $exePath)) {
            throw "Built executable not found: $exePath"
          }
          Write-Host "Dist contents:"
          Get-ChildItem dist -Recurse | Sort-Object Length | Format-Table Name,Length

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $exePath
          $psi.Arguments = "--version"
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.UseShellExecute = $false
          $psi.CreateNoWindow = $true

          $process = [System.Diagnostics.Process]::Start($psi)
          $stdout = $process.StandardOutput.ReadToEnd()
          $stderr = $process.StandardError.ReadToEnd()
          $process.WaitForExit()

          Write-Host "WAVsToAAF --version stdout:"
          Write-Host $stdout
          Write-Host "WAVsToAAF --version stderr:"
          Write-Host $stderr
          Write-Host "WAVsToAAF --version exit code: $($process.ExitCode)"

          if ($process.ExitCode -ne 0) {
            if (Test-Path "$env:TEMP\wavtoaaf_startup.log") {
              Write-Host "Startup wrapper log found:"
              Get-Content "$env:TEMP\wavtoaaf_startup.log"
            }
            throw "WAVsToAAF.exe returned non-zero exit code"
          }
          if (Test-Path "$env:TEMP\wavtoaaf_startup.log") {
            Write-Host "Startup wrapper log found:"
            Get-Content "$env:TEMP\wavtoaaf_startup.log"
          }

      - name: Create distribution package
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $folderName = "WAVsToAAF"
          New-Item -ItemType Directory -Path "dist/$folderName" -Force
          Copy-Item dist/WAVsToAAF.exe "dist/$folderName/"
          Copy-Item docs/README_windows.md "dist/$folderName/"

      - name: Upload distribution files as artifact
        uses: actions/upload-artifact@v6
        with:
          name: WAVsToAAF_v${{ steps.get_version.outputs.version }}
          path: dist/WAVsToAAF/*

      - name: Validate Windows build
        shell: cmd
        run: |
          call validate_windows.bat
